[github]
# GitHub仓库配置
# 格式：用户名/仓库名 或完整URL
repo = CIMTOPSCORP/user-manual
# repo = Charles-Lu2304/LLM
# 分支名称（可选，支持逗号分隔多个分支）
# branch = i-repo-edgeocr-jp
# branch = release-notes-ireporter-cn
# branch = cn-1.system-requirements,cn-3.environment-configuration,cn-4.basicoperation,cn-5.create-a-form,cn-6.clustertype_settingprocedure,cn-7.input-features,cn-8.custom-menu
branch = en-top-ireporter-manual,en-1.system-requirements,en-2.start-guide,en-3.environment-configuration,en-4.basicoperation,en-5.create-a-form,en-6.clustertype_settingprocedure,en-7.input-features,en-8.custom-menu,en-9.output-the-data,en-10.administrator-functions,en-11.server-construction-maintenance,en-12.connection-with-externaldevices,en-13.optional-features,en-14.when-using,en-15.for-support
# branch = cn-top-ireporter-manual
# branch = i-repo-edgeocr-cn
# branch = i-repo-edgeocr-tw
# branch = i-repo-web-ja
# branch = family-server-construction-ja
# 目标文件路径（glob模式，例如：docs/**/*.md, README.md）
# 默认：**/*.md（所有MD文件）
target_paths = **/*.md
# Push选项：none（默认，仅本地保存）或 push_same_repo_direct（直接push到同一仓库，危险操作）
push_option = none

[translation]
# 翻译配置
# 目标语言(en:英文, zh_cn:中文, zh_tw:繁体中文)
# 单个语言时使用 target_language
target_language = en
# 多个语言时使用 target_languages（逗号分隔、優先度高於 target_language）
# target_languages = en,zh_cn,zh_tw
# 专用词语文件路径（支持JSON格式）
# 注意：辞書ファイル名は言語コードに応じて自動的に選択されます
# zh_tw -> dictionary_zh-tw.json, en -> dictionary_en.json
dictionary_file = ./dictionary_en.json

[paths]
# 路径配置
# 下载文件保存目录
download_dir = ./downloaded_files
# 翻译结果保存目录
translated_dir = ./translated_results
# 临时目录
temp_dir = ./temp_repo

[output]
# 输出配置
# 文件命名方式：suffix（后缀方式，如 intro.en.md）或 directory（目录方式，如 /en/intro.md）
# 默认：suffix
naming = suffix

[api]
# API密钥配置（这些也可以通过环境变量设置）
# github_token =  # GitHub令牌（建议使用环境变量 GITHUB_TOKEN）
#  - Classic Token：公开仓库勾选 public_repo；私有仓库需 repo
#  - Fine-grained Token：至少授予 Contents: Read-only、Metadata: Read-only，并授权目标仓库/组织
# openai_api_key =  # OpenAI API密钥
# dashscope_api_key =  # DashScope API密钥
# deepseek_api_key =  # DeepSeek API密钥
# claude_api_key =  # Claude API密钥
# google_api_key =  # Google Gemini API密钥（用于 Gemini 审核）

[models]
# 翻译和审核模型配置
# 翻译模型配置（gpt-4o，qwen3-max，gpt-3.5-turbo）
translate_model_en = gemma3:1b
translate_model_zh_cn = qwen3.5:0.8b
translate_model_zh_tw = qwen3.5:0.8b
translate_model_default = gemma3:1b

# 审核模型配置（gpt-4o，deepseek-chatqwen3-max，gpt-3.5-turbo）
review_model_en = llama3.2:1b
review_model_zh_cn = deepseek-r1:1.5b
review_model_zh_tw = deepseek-r1:1.5b
review_model_default = llama3.2:1b

# 模型提供商配置
# 支持的提供商: openai, dashscope, deepseek, claude, ollama
translate_provider_en = ollama
translate_provider_zh_cn = ollama
translate_provider_zh_tw = ollama
translate_provider_default = ollama

review_provider_en = ollama
review_provider_zh_cn = ollama
review_provider_zh_tw = ollama
review_provider_default = ollama

[ollama]
# Ollama本地模型运行参数（可选，未设置时使用下方默认值）
# 请求读取超时（秒）。模型陷入无限生成或服务卡住时，避免无限阻塞
timeout = 300
# 单次生成的最大token数。防止小模型陷入死循环导致请求永不结束
num_predict = 4096
# 上下文窗口大小。掩码后的提示词较长，需足够大以避免被截断（Ollama默认仅2048）
num_ctx = 8192

[notion]
# Notion集成配置
# 词典数据来源：notion（从Notion数据库读取）或 file（从本地文件读取）
dictionary_source = notion
# Notion API Token（也可以通过环境变量NOTION_TOKEN设置）
notion_token =
# Notion数据库ID（也可以通过环境变量NOTION_DATABASE_ID设置）
notion_database_id =
# API调用延迟（秒）
api_delay = 0.1